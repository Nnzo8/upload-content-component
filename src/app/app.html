<div class="min-h-screen bg-slate-950">
  <div class="mx-auto max-w-5xl px-4 py-8 text-white">
    <h1 class="text-xl font-semibold">Channel Library</h1>
    <div class="mt-2 max-w-2xl text-sm text-slate-300">
      Manage your channel assets. Click below to upload new content.
    </div>

    <button
      type="button"
      class="mt-6 inline-flex items-center rounded-md bg-brand-600 px-4 py-2 text-xs font-semibold text-white hover:bg-brand-700"
      (click)="openUpload()"
    >
      Upload Content
    </button>
  </div>

  <upload-content
    [filestackApiKey]="filestackApiKey()"
    [startOpen]="showUpload()"
    (OnUpload)="handleUpload($event)"
    (closed)="handleUploadClosed()"
  />
</div>
