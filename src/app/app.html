<div class="min-h-screen bg-slate-950">
  <div class="mx-auto max-w-5xl px-4 py-8 text-white">
    <h1 class="text-xl font-semibold">Channel Library</h1>
    <div class="mt-2 max-w-2xl text-sm text-slate-300">
      Manage your channel assets. Click below to upload new content.
    </div>

    <button type="button"
      class="mt-6 inline-flex items-center rounded-md bg-brand-600 px-4 py-2 text-xs font-semibold text-white hover:bg-brand-700"
      (click)="openUpload()">
      Upload Content
    </button>

    <div *ngIf="library().length" class="mt-8 rounded-xl border border-white/10 bg-slate-900/30 p-5">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <div class="text-xs font-semibold text-white/90">Library</div>
          <div class="mt-1 text-xs text-slate-300">{{ library().length }} uploaded</div>
        </div>

        <div class="flex items-center gap-3">
          <div class="flex overflow-hidden rounded-md border border-white/10 bg-slate-950/30">
            <button type="button"
              class="inline-flex h-8 w-8 items-center justify-center text-slate-300 hover:bg-white/5"
              [class.bg-white/10]="viewMode() === 'grid'" (click)="setViewMode('grid')" aria-label="Grid view">
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 3h8v8H3z" />
                <path d="M13 3h8v8h-8z" />
                <path d="M3 13h8v8H3z" />
                <path d="M13 13h8v8h-8z" />
              </svg>
            </button>
            <button type="button"
              class="inline-flex h-8 w-8 items-center justify-center text-slate-300 hover:bg-white/5"
              [class.bg-white/10]="viewMode() === 'list'" (click)="setViewMode('list')" aria-label="List view">
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 6h13" />
                <path d="M8 12h13" />
                <path d="M8 18h13" />
                <path d="M3 6h.01" />
                <path d="M3 12h.01" />
                <path d="M3 18h.01" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div *ngIf="renameTargetId()" class="mt-4 rounded-lg border border-white/10 bg-slate-950/20 p-4">
        <div class="text-[11px] font-semibold uppercase tracking-widest text-slate-200">
          Rename library item
        </div>
        <div class="mt-2 flex flex-wrap items-center gap-3">
          <input
            class="h-9 w-full min-w-[260px] flex-1 rounded-md border border-white/10 bg-slate-950/40 px-3 text-sm text-white outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-300/30"
            [ngModel]="renameDraft()" (ngModelChange)="renameDraft.set($event)" placeholder="Enter a title" />
          <button type="button"
            class="rounded-md bg-brand-600 px-4 py-2 text-xs font-semibold text-white hover:bg-brand-700 disabled:cursor-not-allowed disabled:bg-slate-700"
            (click)="saveLibraryRename()" [disabled]="!renameDraft()">
            SAVE
          </button>
          <button type="button" class="rounded-md px-4 py-2 text-xs font-semibold text-slate-300 hover:bg-white/5"
            (click)="cancelLibraryRename()">
            CANCEL
          </button>
        </div>
      </div>

      <div *ngIf="viewMode() === 'grid'" class="mt-4 grid grid-cols-2 gap-3 md:grid-cols-4">
        <div *ngFor="let l of library()" class="overflow-hidden rounded-lg border border-white/10 bg-slate-950/20">
          <div class="relative aspect-square bg-slate-800/40">
            <video *ngIf="l.isVideo" class="h-full w-full object-cover" [src]="l.url" muted playsinline loop
              (mouseenter)="videoEnter(vg)" (mouseleave)="videoLeave(vg)" #vg></video>
            <img *ngIf="!l.isVideo" class="h-full w-full object-cover" [src]="l.url" [alt]="l.filename" />

            <button type="button"
              class="absolute right-2 top-2 inline-flex h-8 w-8 items-center justify-center rounded-md bg-black/40 text-white shadow-sm hover:bg-black/55"
              (click)="beginLibraryRename(l.id)" aria-label="Rename">
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
              </svg>
            </button>
          </div>
          <div class="px-3 py-2">
            <div class="truncate text-xs font-semibold text-white/90">{{ l.title }}</div>
            <div class="mt-0.5 truncate text-[11px] text-slate-300">{{ l.filename }}</div>
          </div>
        </div>
      </div>

      <div *ngIf="viewMode() === 'list'" class="mt-4 space-y-2">
        <div *ngFor="let l of library()"
          class="flex items-center gap-3 rounded-lg border border-white/10 bg-slate-950/20 p-3">
          <div class="h-12 w-12 overflow-hidden rounded-md bg-slate-800/40">
            <video *ngIf="l.isVideo" class="h-12 w-12 object-cover" [src]="l.url" muted playsinline loop
              (mouseenter)="videoEnter(vl)" (mouseleave)="videoLeave(vl)" #vl></video>
            <img *ngIf="!l.isVideo" class="h-12 w-12 object-cover" [src]="l.url" [alt]="l.filename" />
          </div>

          <div class="min-w-0 flex-1">
            <div class="truncate text-xs font-semibold text-white/90">{{ l.title }}</div>
            <div class="mt-0.5 truncate text-[11px] text-slate-300">{{ l.filename }}</div>
          </div>

          <button type="button"
            class="inline-flex h-8 w-8 items-center justify-center rounded-md text-slate-200 hover:bg-white/5"
            (click)="beginLibraryRename(l.id)" aria-label="Rename">
            <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <upload-content [filestackApiKey]="filestackApiKey()" [googleApiKey]="googleApiKey()"
    [googleClientId]="googleClientId()" [initialLibrary]="library()" [startOpen]="showUpload()"
    (OnUpload)="handleUpload($event)" (closed)="handleUploadClosed()" />
</div>
